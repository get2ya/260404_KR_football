<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>대한민국 해외 진출 축구선수 연대표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--primary:#1a5632;--accent:#d4a017;--info:#2471a3;--danger:#c0392b;--dark:#1a1a2e;--bg:#f8f9fa;--card-bg:#fff;--text:#333;--text-light:#6c757d;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{text-decoration:none;color:inherit}

/* Hero */
.hero{background:linear-gradient(135deg,#0d2b1a 0%,#1a5632 40%,#2d7a4f 70%,#1a4a2e 100%);color:#fff;padding:80px 20px 60px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero h1{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;margin-bottom:12px;position:relative}
.hero h1 span{color:var(--accent)}
.hero p{font-size:clamp(0.9rem,2vw,1.1rem);opacity:.85;max-width:600px;margin:0 auto;position:relative}

/* Container */
.container{max-width:1200px;margin:0 auto;padding:0 20px}

/* Section */
.section{padding:50px 0}
.section-title{font-size:1.5rem;font-weight:900;color:var(--primary);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.section-title::before{content:'';width:4px;height:28px;background:var(--accent);border-radius:2px;flex-shrink:0}
.section-desc{color:var(--text-light);margin-bottom:30px;font-size:.95rem}

/* Filter Bar */
.filter-bar{background:#fff;border-radius:var(--radius);padding:20px;margin-bottom:30px;box-shadow:var(--shadow);display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.filter-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.filter-group label{font-size:.8rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px}
.filter-btn{padding:6px 14px;border:1.5px solid #e0e0e0;border-radius:20px;font-size:.82rem;font-weight:500;cursor:pointer;background:#fff;color:var(--text);transition:all .2s;font-family:inherit}
.filter-btn:hover{border-color:var(--primary);color:var(--primary)}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.filter-btn.active-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
select.filter-select{padding:6px 12px;border:1.5px solid #e0e0e0;border-radius:20px;font-size:.82rem;font-family:inherit;cursor:pointer;background:#fff;outline:none}
.filter-divider{width:1px;height:30px;background:#e0e0e0;margin:0 4px}

/* Card Grid */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.player-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);cursor:pointer;transition:all .25s;position:relative;border:2px solid transparent}
.player-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12);border-color:var(--primary)}
.player-card.selected{border-color:var(--accent);background:#fffdf5}
.card-check{position:absolute;top:12px;right:12px;width:22px;height:22px;border-radius:50%;border:2px solid #ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;background:#fff;z-index:2}
.card-check.checked{background:var(--accent);border-color:var(--accent);color:#fff}
.card-check.checked::after{content:'✓';font-size:13px;font-weight:700}
.card-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:900;color:#fff;flex-shrink:0;letter-spacing:-1px}
.card-info h3{font-size:1.05rem;font-weight:700;margin-bottom:2px}
.card-info .pos-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:700;background:#e8f5e9;color:var(--primary)}
.card-meta{font-size:.8rem;color:var(--text-light);display:flex;flex-direction:column;gap:4px;margin-top:6px}
.card-meta span{display:flex;align-items:center;gap:4px}
.card-club{font-weight:600;color:var(--info)}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.tag{padding:2px 8px;border-radius:8px;font-size:.68rem;font-weight:600}
.tag-active{background:#e8f5e9;color:#1a5632}
.tag-legend{background:#fef3e2;color:#b8860b}
.tag-route{background:#e8eaf6;color:#3949ab}

/* Floating Compare Button */
.compare-float{position:fixed;bottom:30px;right:30px;background:var(--accent);color:#fff;border:none;padding:14px 28px;border-radius:30px;font-size:.95rem;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 20px rgba(212,160,23,.4);z-index:90;display:none;transition:all .3s;animation:pulse 2s infinite}
.compare-float:hover{transform:scale(1.05)}
@keyframes pulse{0%,100%{box-shadow:0 4px 20px rgba(212,160,23,.4)}50%{box-shadow:0 4px 30px rgba(212,160,23,.7)}}

/* Path Type Cards */
.path-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
.path-card{background:#fff;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);border-top:4px solid var(--primary)}
.path-card.type-overseas{border-top-color:var(--info)}
.path-card.type-kleague{border-top-color:var(--primary)}
.path-card.type-youth{border-top-color:var(--danger)}
.path-card h3{font-size:1.1rem;font-weight:700;margin-bottom:6px}
.path-card .path-desc{font-size:.85rem;color:var(--text-light);margin-bottom:12px}
.path-card .path-players{display:flex;flex-wrap:wrap;gap:6px}
.path-card .path-player{padding:4px 10px;background:var(--bg);border-radius:8px;font-size:.8rem;font-weight:500}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;max-width:800px;width:100%;max-height:calc(100vh - 60px);overflow-y:auto;position:relative;animation:modalIn .3s}
@keyframes modalIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-close{position:sticky;top:0;float:right;width:36px;height:36px;border-radius:50%;border:none;background:rgba(0,0,0,.08);font-size:1.2rem;cursor:pointer;z-index:5;margin:12px 12px 0 0}
.modal-header{padding:30px 30px 20px;border-bottom:1px solid #eee}
.modal-header h2{font-size:1.4rem;font-weight:900}
.modal-header .modal-sub{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;font-size:.85rem;color:var(--text-light)}
.modal-header .modal-sub span{display:flex;align-items:center;gap:4px}
.modal-body{padding:30px}

/* Timeline */
.timeline{position:relative;padding-left:30px}
.timeline::before{content:'';position:absolute;left:12px;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--primary),var(--accent),var(--info))}
.tl-item{position:relative;margin-bottom:24px;padding-bottom:4px}
.tl-item::before{content:'';position:absolute;left:-23px;top:4px;width:14px;height:14px;border-radius:50%;background:var(--primary);border:3px solid #fff;box-shadow:0 0 0 2px var(--primary);z-index:1}
.tl-item.tl-overseas::before{background:var(--info);box-shadow:0 0 0 2px var(--info)}
.tl-item.tl-natl::before{background:var(--danger);box-shadow:0 0 0 2px var(--danger)}
.tl-stage{font-size:.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.tl-title{font-size:.95rem;font-weight:700;margin-bottom:2px}
.tl-detail{font-size:.82rem;color:var(--text-light);line-height:1.5}
.tl-highlight{background:#fffde7;padding:2px 6px;border-radius:4px;font-weight:600;color:#b8860b}
.tl-fee{display:inline-block;padding:2px 8px;background:#e3f2fd;border-radius:6px;font-weight:700;color:var(--info);font-size:.78rem;margin-top:2px}

/* Compare Modal */
.compare-grid{display:grid;gap:0;overflow-x:auto}
.compare-row{display:contents}
.compare-cell{padding:12px 14px;border-bottom:1px solid #f0f0f0;font-size:.82rem}
.compare-cell.header-cell{background:var(--bg);font-weight:700;font-size:.75rem;color:var(--text-light);text-transform:uppercase;position:sticky;left:0;z-index:1}
.compare-cell.player-name{background:var(--primary);color:#fff;font-weight:700;text-align:center;font-size:.9rem;padding:14px 10px}
.compare-cell .compare-val{font-weight:600}
.compare-cell .compare-sub{font-size:.75rem;color:var(--text-light);margin-top:2px}
.compare-common{background:#e8f5e9;padding:4px 8px;border-radius:6px;font-size:.78rem;color:#1a5632;font-weight:600;display:inline-block;margin:2px}
.compare-diff{background:#fce4ec;padding:4px 8px;border-radius:6px;font-size:.78rem;color:#c0392b;font-weight:600;display:inline-block;margin:2px}

/* Responsive */
@media(max-width:768px){
  .filter-bar{flex-direction:column;align-items:flex-start}
  .filter-divider{display:none}
  .card-grid{grid-template-columns:1fr 1fr}
  .modal{border-radius:12px}
  .modal-header,.modal-body{padding:20px}
  .compare-float{bottom:16px;right:16px;padding:12px 20px;font-size:.85rem}
}
@media(max-width:480px){
  .card-grid{grid-template-columns:1fr}
  .hero{padding:60px 16px 40px}
}

/* Scrollbar */
.modal::-webkit-scrollbar{width:6px}
.modal::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* Badge colors by position */
.pos-fw{background:#ffebee;color:#c62828}
.pos-mf{background:#e8f5e9;color:#2e7d32}
.pos-df{background:#e3f2fd;color:#1565c0}
.pos-gk{background:#fff3e0;color:#e65100}
</style>
</head>

// ========== AVATAR COLORS ==========
const avatarColors = ['#1a5632','#2471a3','#c0392b','#8e44ad','#d35400','#16a085','#2c3e50','#c0392b','#27ae60','#e74c3c','#3498db','#9b59b6','#f39c12','#1abc9c','#e67e22','#2980b9','#8e44ad','#d4a017','#34495e','#e74c3c'];

// ========== STATE ==========
let selectedPlayers = new Set();
let currentFilters = { status:'all', pos:'all', route:'all' };
let currentSort = 'age';

// ========== RENDER CARDS ==========
function getFilteredSorted() {
  let list = [...players];
  if (currentFilters.status !== 'all') list = list.filter(p => p.status === currentFilters.status);
  if (currentFilters.pos !== 'all') list = list.filter(p => p.posGroup === currentFilters.pos);
  if (currentFilters.route !== 'all') list = list.filter(p => p.route === currentFilters.route);
  if (currentSort === 'age') list.sort((a,b) => b.birth - a.birth);
  else if (currentSort === 'age-desc') list.sort((a,b) => a.birth - b.birth);
  else if (currentSort === 'fee') list.sort((a,b) => {
    const fa = a.feeUnit.includes('€') ? a.fee * 15 : a.fee;
    const fb = b.feeUnit.includes('€') ? b.fee * 15 : b.fee;
    return fb - fa;
  });
  return list;
}

function renderCards() {
  const grid = document.getElementById('cardGrid');
  const list = getFilteredSorted();
  if (list.length === 0) {
    grid.innerHTML = '<p style="text-align:center;color:#999;padding:40px;grid-column:1/-1">조건에 맞는 선수가 없습니다.</p>';
    return;
  }
  grid.innerHTML = list.map((p,i) => {
    const initials = p.name.length >= 2 ? p.name[0] + p.name[p.name.length-1] : p.name[0];
    const color = avatarColors[p.id % avatarColors.length];
    const sel = selectedPlayers.has(p.id);
    const posClass = p.posGroup === 'FW' ? 'pos-fw' : p.posGroup === 'MF' ? 'pos-mf' : p.posGroup === 'DF' ? 'pos-df' : 'pos-gk';
    const statusTag = p.status === 'active' ? '<span class="tag tag-active">현역</span>' : '<span class="tag tag-legend">레전드</span>';
    const routeTag = `<span class="tag tag-route">${p.route}</span>`;
    return `<div class="player-card ${sel?'selected':''}" data-id="${p.id}">
      <div class="card-check ${sel?'checked':''}" onclick="event.stopPropagation();toggleSelect(${p.id})"></div>
      <div class="card-top">
        <div class="avatar" style="background:${color}">${initials}</div>
        <div class="card-info">
          <h3>${p.name}</h3>
          <span class="pos-badge ${posClass}">${p.position}</span>
        </div>
      </div>
      <div class="card-meta">
        <span>&#128197; ${p.birth}년생 (${2026 - p.birth}세)</span>
        <span class="card-club">&#9917; ${p.club}${p.league !== '-' ? ' ('+p.league+')' : ''}</span>
        ${p.fee > 0 ? '<span>&#128176; 이적료 ' + p.fee.toLocaleString() + p.feeUnit + '</span>' : ''}
      </div>
      <div class="card-tags">${statusTag}${routeTag}</div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.player-card').forEach(card => {
    card.addEventListener('click', () => openDetail(+card.dataset.id));
  });
}

// ========== FILTERS ==========
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const filter = btn.dataset.filter;
    const value = btn.dataset.value;
    document.querySelectorAll(`.filter-btn[data-filter="${filter}"]`).forEach(b => b.classList.remove('active','active-accent'));
    btn.classList.add('active');
    currentFilters[filter] = value;
    renderCards();
  });
});
document.getElementById('sortSelect').addEventListener('change', e => {
  currentSort = e.target.value;
  renderCards();
});

// ========== SELECT / COMPARE ==========
function toggleSelect(id) {
  if (selectedPlayers.has(id)) selectedPlayers.delete(id);
  else if (selectedPlayers.size < 4) selectedPlayers.add(id);
  else { alert('최대 4명까지 선택할 수 있습니다.'); return; }
  updateCompareBtn();
  renderCards();
}

function updateCompareBtn() {
  const btn = document.getElementById('compareBtn');
  const cnt = document.getElementById('compareCount');
  cnt.textContent = selectedPlayers.size;
  btn.style.display = selectedPlayers.size >= 2 ? 'block' : 'none';
}

// ========== DETAIL MODAL ==========
function openDetail(id) {
  const p = players.find(x => x.id === id);
  if (!p) return;
  const posClass = p.posGroup === 'FW' ? 'pos-fw' : p.posGroup === 'MF' ? 'pos-mf' : 'pos-df';
  document.getElementById('modalHeader').innerHTML = `
    <h2>${p.name}</h2>
    <div class="modal-sub">
      <span class="pos-badge ${posClass}">${p.position}</span>
      <span>&#128197; ${p.birth}년생</span>
      <span>&#9917; ${p.club}</span>
      <span>${p.status === 'active' ? '&#127941; 현역' : '&#127942; 레전드'}</span>
    </div>`;

  let tlHtml = '<div class="timeline">';
  p.timeline.forEach(t => {
    const isOverseas = t.overseas ? ' tl-overseas' : '';
    const stageLabel = {'초등':'초등학교','중학':'중학교','고등':'고등학교','대학':'대학교','프로':'프로(국내)','해외':'해외','해외유소년':'해외 유소년','국내':'국내 프로','복귀':'국내 복귀'}[t.stage] || t.stage;
    tlHtml += `<div class="tl-item${isOverseas}">
      <div class="tl-stage">${stageLabel} ${t.period ? '(' + t.period + ')' : ''}</div>
      <div class="tl-title">${t.title}</div>
      <div class="tl-detail">${t.detail}${t.highlight ? ' <span class="tl-highlight">' + t.highlight + '</span>' : ''}${t.fee ? ' <span class="tl-fee">' + t.fee + '</span>' : ''}</div>
    </div>`;
  });
  tlHtml += '</div>';

  let natl = '';
  if (p.national) {
    natl = `<div class="tl-item tl-natl" style="margin-top:20px;padding-top:16px;border-top:2px dashed #eee">
      <div class="tl-stage">국가대표</div>
      <div class="tl-detail">${p.national}</div>
    </div>`;
  }
  let noteHtml = p.note ? `<div style="margin-top:20px;padding:14px;background:#f8f9fa;border-radius:10px;font-size:.88rem"><strong>&#128161; 특이사항:</strong> ${p.note}</div>` : '';

  document.getElementById('modalBody').innerHTML = tlHtml + natl + noteHtml;
  document.getElementById('detailModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

// ========== COMPARE MODAL ==========
function openCompare() {
  if (selectedPlayers.size < 2) return;
  const sel = [...selectedPlayers].map(id => players.find(x => x.id === id));
  const cols = sel.length;
  const stages = ['초등','중학','고등','대학','프로','해외','복귀','국가대표','특이사항'];
  const stageLabels = {'초등':'초등학교','중학':'중학교','고등':'고등학교','대학':'대학교','프로':'프로(국내)','해외':'해외 경력','복귀':'국내 복귀','국가대표':'국가대표','특이사항':'특이사항'};

  let html = `<div class="compare-grid" style="display:grid;grid-template-columns:120px repeat(${cols},1fr)">`;

  // Header row
  html += '<div class="compare-cell header-cell" style="background:#fff"></div>';
  sel.forEach(p => {
    const color = avatarColors[p.id % avatarColors.length];
    html += `<div class="compare-cell player-name" style="background:${color}">${p.name}<br><span style="font-size:.75rem;opacity:.8">${p.birth}년생 | ${p.position}</span></div>`;
  });

  stages.forEach(stage => {
    html += `<div class="compare-cell header-cell">${stageLabels[stage]}</div>`;
    sel.forEach(p => {
      if (stage === '국가대표') {
        html += `<div class="compare-cell"><div class="compare-val">${p.national || '-'}</div></div>`;
      } else if (stage === '특이사항') {
        html += `<div class="compare-cell"><div class="compare-val">${p.note || '-'}</div></div>`;
      } else {
        const items = p.timeline.filter(t => {
          if (stage === '해외') return t.stage === '해외' || t.stage === '해외유소년';
          return t.stage === stage;
        });
        if (items.length === 0) {
          html += '<div class="compare-cell" style="color:#ccc">-</div>';
        } else {
          html += '<div class="compare-cell">';
          items.forEach(t => {
            html += `<div class="compare-val">${t.title}</div><div class="compare-sub">${t.period || ''}${t.highlight ? ' / ' + t.highlight : ''}${t.fee ? ' / ' + t.fee : ''}</div>`;
          });
          html += '</div>';
        }
      }
    });
  });

  // Common/Difference analysis
  html += `<div class="compare-cell header-cell" style="border-top:2px solid var(--accent)">공통점 / 차이점</div>`;
  html += `<div class="compare-cell" style="grid-column:2/-1;border-top:2px solid var(--accent)">`;
  // Find commonalities
  const routes = sel.map(p => p.route);
  const allSameRoute = routes.every(r => r === routes[0]);
  if (allSameRoute) html += `<span class="compare-common">동일 진출경로: ${routes[0]}</span> `;
  else html += `<span class="compare-diff">진출경로 상이: ${[...new Set(routes)].join(' vs ')}</span> `;

  const statuses = sel.map(p => p.status);
  const allSameStatus = statuses.every(s => s === statuses[0]);
  if (allSameStatus) html += `<span class="compare-common">모두 ${statuses[0]==='active'?'현역':'레전드'}</span> `;
  else html += `<span class="compare-diff">현역/레전드 혼재</span> `;

  const posGroups = sel.map(p => p.posGroup);
  const allSamePos = posGroups.every(pg => pg === posGroups[0]);
  if (allSamePos) html += `<span class="compare-common">동일 포지션 그룹: ${posGroups[0]}</span> `;
  else html += `<span class="compare-diff">포지션 상이: ${[...new Set(posGroups)].join(' vs ')}</span> `;

  // Check if any share same school
  const allSchools = sel.map(p => p.timeline.map(t => t.title)).flat();
  const schoolCounts = {};
  allSchools.forEach(s => { schoolCounts[s] = (schoolCounts[s]||0)+1; });
  const shared = Object.entries(schoolCounts).filter(([k,v]) => v > 1).map(([k]) => k);
  if (shared.length > 0) html += `<br><span class="compare-common" style="margin-top:6px">공통 소속: ${shared.join(', ')}</span>`;

  html += '</div></div>';

  document.getElementById('compareBody').innerHTML = html;
  document.getElementById('compareModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

// ========== CLOSE MODAL ==========
function closeModal(id) {
  document.getElementById(id).classList.remove('show');
  document.body.style.overflow = '';
}
document.getElementById('detailModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal('detailModal'); });
document.getElementById('compareModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal('compareModal'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal('detailModal'); closeModal('compareModal'); }});
